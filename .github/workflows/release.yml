# @author Kurok1 <im.kurokyhanc@gmail.com>
# @since 0.1.0
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # 创建 Release
  packages: write   # 推送 ghcr 镜像

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            out="mcp-server-mysql_${VERSION}_${GOOS}_${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/${out}/mcp-server-mysql" ./cmd/mcp-server-mysql
            cp README.md config.example.yaml "dist/${out}/"
            tar -czf "dist/${out}.tar.gz" -C dist "${out}"
            rm -r "dist/${out}"
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action 会把镜像名自动转小写（ghcr 要求）
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # 默认 latest=auto 只给正式版 semver 打 latest，rc 等预发布版会被跳过；
          # 显式 latest=true 让 latest 始终指向最新一次 tag 构建
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 镜像推送完成后，把 server.json 发布到官方 MCP registry（registry.modelcontextprotocol.io）。
  # registry 会拉取镜像校验 io.modelcontextprotocol.server.name label，因此必须 needs: docker
  mcp-registry:
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      id-token: write   # GitHub OIDC 登录 MCP registry，无需额外密钥
      contents: read
    steps:
      - uses: actions/checkout@v4

      # 注意：OCI 包禁止 version 字段（registry 校验器会报错），版本只体现在 identifier 的 tag 里
      - name: Stamp version into server.json
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
             '.version = $v
              | .packages[0].identifier = "ghcr.io/kurok1/mcp-server-mysql:" + $v' \
             server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
