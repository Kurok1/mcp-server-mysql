# @since 0.1.0
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # 创建 Release
  packages: write   # 推送 ghcr 镜像

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            out="mcp-server-mysql_${VERSION}_${GOOS}_${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/${out}/mcp-server-mysql" ./cmd/mcp-server-mysql
            cp README.md config.example.yaml "dist/${out}/"
            tar -czf "dist/${out}.tar.gz" -C dist "${out}"
            rm -r "dist/${out}"
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action 会把镜像名自动转小写（ghcr 要求）
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # 默认 latest=auto 只给正式版 semver 打 latest，rc 等预发布版会被跳过；
          # 显式 latest=true 让 latest 始终指向最新一次 tag 构建
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
